{% extends "appuser/base.html" %}
{% block content %}

<!-- start banner Area -->
<section class="banner-area relative" id="home">
    <div class="overlay overlay-bg"></div>
    <div class="container">
        <div class="row d-flex align-items-center justify-content-center">
            <div class="about-content col-lg-12">
                <h1 class="text-white">Contact Us
                </h1>
                <p class="text-white link-nav"><a href="/">Home </a><span class="lnr lnr-arrow-right"></span><a
                        href="contact.html">Contact Us</a></p>
            </div>
        </div>
    </div>
</section>
<!-- End banner Area -->

<!-- Start contact-page Area -->
<section class="contact-page-area section-gap">
    <div class="container">
        <div class="row">
            <div class="col-lg-4 d-flex flex-column address-wrap">
                <div class="single-contact-address d-flex flex-row">
                    <div class="icon">
                        <span class="lnr lnr-home"></span>
                    </div>
                    <div class="contact-details">
                        <h5>Maharashtra, India</h5>
                        <p>53/9, West Mumbai</p>
                    </div>
                </div>
                <div class="single-contact-address d-flex flex-row">
                    <div class="icon">
                        <span class="lnr lnr-phone-handset"></span>
                    </div>
                    <div class="contact-details">
                        <h5>+91 (705)8297 230</h5>
                        <p>Mon to Fri 9am to 6 pm</p>
                    </div>
                </div>
                <div class="single-contact-address d-flex flex-row">
                    <div class="icon">
                        <span class="lnr lnr-envelope"></span>
                    </div>
                    <div class="contact-details">
                        <h5>support@comservices.com</h5>
                        <p>Send us your query anytime!</p>
                    </div>
                </div>
            </div>
            <div class="col-lg-8">
                <form method="post" class="form-area contact-form text-right">
                    {%csrf_token%}
                    <div class="row">
                        <div class="col-lg-6 form-group">
                            <input name="sname" placeholder="Enter your name" onfocus="this.placeholder = ''"
                                   onblur="this.placeholder = 'Enter your name'" class="common-input mb-20 form-control"
                                   required="" type="text">
                            <input name="smobile" placeholder="Enter mobile number" pattern="[789][0-9]{9}"
                                   onfocus="this.placeholder = ''" onblur="this.placeholder = 'Enter mobile number'"
                                   class="common-input mb-20 form-control" required="" type="phone">
                            <div class="mt-20 alert-msg text-info" style="text-align: left;">{{message}}</div>
                        </div>
                        <div class="col-lg-6 form-group">
                            <textarea class="common-textarea form-control" name="smessage" placeholder="Message"
                                      onfocus="this.placeholder = ''" onblur="this.placeholder = 'Message'"
                                      required=""></textarea>
                            <button class="genric-btn primary circle mt-30" style="float: right;" type="submit">Send
                                Message
                            </button>
                        </div>
                    </div>
                </form>
            </div>
            <div class="map-wrap" style="width: 100%; height: 445px;" id="map"></div>
        </div>
    </div>
</section>
<!-- End contact-page Area -->

{% endblock %}
