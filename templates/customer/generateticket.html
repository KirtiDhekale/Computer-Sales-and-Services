{% extends "customer/base.html" %}
{% block content %}

<!-- start banner Area -->
<section class="banner-area relative" id="home">
    <div class="overlay overlay-bg"></div>
    <div class="container">
        <div class="row d-flex align-items-center justify-content-center">
            <div class="about-content col-lg-12">
                <h1 class="text-white">Ticket Generation Form
                </h1>
            </div>
        </div>
    </div>
</section>
<!-- End banner Area -->

<section class="home-about-area section-gap" id="about">
    <div class="container">
        <div class="row justify-content-center align-items-center">
            <div class="col-lg-6 col-md-12 home-about-right relative">
                 <form class="form-wrap" method="post">
                    {%csrf_token%}
                    <h4 class="text-white pb-20">Generate Ticket Here!</h4>
                     <select name="pname" class="form-control bg-dark" required>
                         <option value="">Select Product</option>
                         {% for product in products %}
                         <option value="{{product.pname}}">{{product.pname}}</option>
                         {% endfor %}
                     </select>
                    <textarea name="cmessage" class="form-control" placeholder="Enter your problem here" required></textarea>
                    <input type="submit" class="primary-btn" value="Submit"/>
                    <label class="text-info">{{message}}</label>
                </form>
            </div>
        </div>
    </div>
</section>

{% endblock %}
